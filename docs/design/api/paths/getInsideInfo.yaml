parameters:
  $ref: '../components/parameters/period.yaml'
get:
  description: 室内環境情報取得API
  responses:
    "200":
      description: Success
      content:
        application/json:
          schema:
            type: object
            propaties:
              id: 
                $ref: '../components/schemas/outsideId.yaml'
              temperature:
                $ref: '../components/schemas/temperature.yaml'
              humidity:
                $ref: '../components/schemas/humidity.yaml'
              airPressure:
                $ref: '../components/schemas/airPressure.yaml'
              measurementTime:
                $ref: '../components/schemas/measurementTime.yaml'
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              $ref: '../components/schemas/error.yaml'
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              $ref: '../components/schemas/error.yaml'
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              $ref: '../components/schemas/error.yaml'