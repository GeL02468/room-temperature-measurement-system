post:
  description: 判定閾値設定API
  requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/RecipeInput'
  responses:
    "200":
      description: Success
      content:
        application/json:
          schema:
            type: object
            propaties:
              id: 
                $ref: '../components/schemas/notificationId.yaml'
              sentence:
                $ref: '../components/schemas/notificationSentence.yaml'
              notificationTime:
                $ref: '../components/schemas/notificationTime.yaml'
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              $ref: '../components/schemas/error.yaml'
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              $ref: '../components/schemas/error.yaml'
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              $ref: '../components/schemas/error.yaml'