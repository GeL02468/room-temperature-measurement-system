    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            required:
              - deviceId
              - deviceName
            properties:
              deviceId:
                $ref: '../components/schemas/deviceId.yaml'
              deviceName: 
                $ref: '../components/schemas/deviceName.yaml'
