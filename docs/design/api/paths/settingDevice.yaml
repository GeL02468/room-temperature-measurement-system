delete:
  summary: デバイス削除API
  description: デバイスを削除する
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            required:
              - deviceId
            properties:
              deviceId:
                $ref: '../components/schemas/deviceId.yaml'
  responses:
    204:
      description: No Content
    404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/error.yaml'
    500:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/error.yaml'