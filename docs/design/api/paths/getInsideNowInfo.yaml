parameters:
  - $ref: '../components/parameters/deviceId.yaml'
get:
  summary: リアルタイム室内環境情報取得API
  description: デバイスのリアルタイム室内環境情報を取得する
  responses:
    200:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              deviceId:
                $ref: '../components/schemas/deviceId.yaml'
              deviceName: 
                $ref: '../components/schemas/deviceName.yaml'
              temperature:
                $ref: '../components/schemas/temperature.yaml'
              humidity:
                $ref: '../components/schemas/humidity.yaml'
              airPressure:
                $ref: '../components/schemas/airPressure.yaml'
              measurementTime:
                $ref: '../components/schemas/measurementTime.yaml'
    404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/error.yaml'
    500:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/error.yaml'