openapi: 3.0.3

info:
  title: Sample API
  version: 1.0.0
  description: サンプル用のWebAPI仕様書
servers:
  - url: http://localhost/api

paths:
  /notification:
    $ref: "./paths/notification.yaml"
                  
components:
  schemas:
    SampleRequest:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 10
          description: ID
        hoge:
          type: string
          example: "sample"
          description: hoge
